site_name: bahmoudd
site_url: https://bahmoudd.github.io
site_author: Bahman Altamash

repo_name: bahmoudd/bahmoudd.github.io
repo_url: https://github.com/bahmoudd/bahmoudd.github.io

theme:
  name: material
  locale: en
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode

    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep orange
      toggle:
        icon: material/brightness-4
        name: Switch to system preference

  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.path
    - navigation.top
    - search.suggest
    - search.highlight
    - toc.follow
    - toc.integrate

plugins:
  - search
  - offline

markdown_extensions:
  - nl2br
  - fenced_code
  - tables
  - toc
  - pymdownx.tasklist
  - pymdownx.tilde
  - pymdownx.superfences
  - pymdownx.emoji 
  - gfm_admonition
nav:
  - Home: index.md
  - Arch Install Guide:
    - Main Guide: arch-install-guide/main-guide.md
    - Window Managers: arch-install-guide/window-managers.md
  - The Tech Times:
    - 2025-01-04: the-tech-times/2025-01-04.md
  - Changelog:
    - 2025-01-11: changelog/2025-01-11.md